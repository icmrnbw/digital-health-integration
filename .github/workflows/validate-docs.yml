name: Validate docs

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review] # rebuild on open, new commits, reopen, and ready-for-review

jobs:
  sushi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Sushi
        run: sudo npm install -g fsh-sushi

      - name: Validate with Sushi
        run: sushi .

  ig-publisher:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Jekyll
        run: sudo gem install jekyll

      - name: Install Sushi
        run: sudo npm install -g fsh-sushi

      - name: Install IG publisher
        run: |
          # Download the IG Publisher directly rather than via _updatePublisher.sh.
          # That script gates on `curl -sSf tx.fhir.org`, but tx.fhir.org's http
          # root now returns 404 (the https /r4 API is fine), so the gate aborts
          # the whole build. Fetching the jar directly avoids the broken check.
          mkdir -p input-cache
          curl -fL --retry 4 --retry-delay 10 -o input-cache/publisher.jar \
            https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar
          file input-cache/publisher.jar | grep -q "Java archive" || { echo "::error::publisher.jar download invalid"; exit 1; }

      - name: Check that the IG builds successfully
        env:
          JAVA_TOOL_OPTIONS: "-Xmx6g -Dfile.encoding=UTF-8"
        run: |
          # Run the publisher directly against the working https terminology server.
          # _genonce.sh uses the same broken `curl -sSf tx.fhir.org` check and falls
          # back to `-tx n/a`, which disables terminology validation and floods QA
          # with spurious errors/warnings.
          java -jar input-cache/publisher.jar -ig . -tx https://tx.fhir.org
          echo "✅ IG built successfully"

      - name: Check QA report
        run: |
          # Configuration
          MAX_ALLOWED_ERRORS=1
          MAX_ALLOWED_WARNINGS=0

          if [ ! -f "output/qa.json" ]; then
            echo "❌ QA file not found: output/qa.json"
            exit 1
          fi

          # Extract errors and warnings from qa.json
          ERRORS=$(jq -r '.errs // 0' output/qa.json)
          WARNINGS=$(jq -r '.warnings // 0' output/qa.json)

          echo "  QA Results:"
          echo "   Errors: $ERRORS"
          echo "   Warnings: $WARNINGS"
          
          # Check if errors exceed threshold
          if [ "$ERRORS" -gt $MAX_ALLOWED_ERRORS ]; then
            echo "❌ Too many errors: $ERRORS (maximum allowed: $MAX_ALLOWED_ERRORS known errors)"
            exit 1
          fi
          
          # Check if there are any warnings
          if [ "$WARNINGS" -gt $MAX_ALLOWED_WARNINGS ]; then
            echo "❌ Warnings found: $WARNINGS (maximum allowed: $MAX_ALLOWED_WARNINGS)"
            exit 1
          fi
          
          echo "✅ QA check passed: $ERRORS errors (≤$MAX_ALLOWED_ERRORS) and $WARNINGS warnings (≤$MAX_ALLOWED_WARNINGS)"

      - name: Upload output folder
        if: always() && hashFiles('output/**/*') != ''
        uses: actions/upload-artifact@v7
        with:
          name: ig-output-${{ github.run_number }}
          path: output/
          retention-days: 30
          if-no-files-found: warn
